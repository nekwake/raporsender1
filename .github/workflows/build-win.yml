# Windows kurulum + GitHub Releases yayını
#
# electron-updater, GitHub Releases üzerindeki latest.yml + .exe dosyalarını arar;
# yalnızca Actions artifact’i yetmez — bu yüzden main’e push’ta publish çalışır.
#
# Her yeni sürüm için package.json içinde "version" değerini artırın (örn. 1.0.2 → 1.0.3).
# Aynı sürüm numarasıyla ikinci kez yayın genelde electron-builder tarafından reddedilir.
#
# Depo private ise: GitHub Releases API kurulu uygulamadan kimlik doğrulamasız erişilemeyebilir;
# bu durumda repoyu public yapın veya generic provider + barındırma kullanın (uygulama içi mesaja bakın).

name: Build (Windows)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # PR: yalnızca derleme doğrulaması; Release oluşturulmaz
      - name: Build Windows installer (PR)
        if: github.event_name == 'pull_request'
        run: npm run build:win

      # main / manuel: GitHub Releases + latest.yml (güncelleme denetimi bunu kullanır)
      - name: Build and publish to GitHub Releases
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win:publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: assistant-windows-dist
          path: dist/**
          if-no-files-found: error
